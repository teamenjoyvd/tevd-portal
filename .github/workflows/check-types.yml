name: Type Check

on:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Supabase types + tsc
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate fresh types
        run: |
          supabase gen types typescript \
            --project-id ynykjpnetfwqzdnsgkkg \
            > /tmp/supabase-fresh.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Diff types against committed file
        run: |
          if ! diff -u types/supabase.ts /tmp/supabase-fresh.ts; then
            echo ""
            echo "❌ types/supabase.ts is stale."
            echo "Run: supabase gen types typescript --project-id ynykjpnetfwqzdnsgkkg > types/supabase.ts"
            echo "Then commit the updated file."
            exit 1
          fi
          echo "✅ types/supabase.ts is up to date."

      - name: TypeScript check
        run: npx tsc --noEmit
