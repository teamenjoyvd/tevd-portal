name: Type Check

on:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Supabase types + tsc
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate fresh types
        run: |
          supabase gen types typescript \
            --project-id ynykjpnetfwqzdnsgkkg \
            > /tmp/supabase-fresh.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Diff types against committed file
        run: |
          if ! diff -u types/supabase.ts /tmp/supabase-fresh.ts; then
            echo "❌ types/supabase.ts is stale."
            exit 1
          fi
          echo "✅ types/supabase.ts is up to date."

      - name: TypeScript check
        run: |
          echo "::group::tsc output"
          npx tsc --noEmit 2>&1 | tee /tmp/tsc-output.txt
          echo "::endgroup::"
          if grep -q "error TS" /tmp/tsc-output.txt; then
            echo "❌ TypeScript errors found:"
            grep "error TS" /tmp/tsc-output.txt
            exit 1
          fi
          echo "✅ tsc --noEmit passed."
