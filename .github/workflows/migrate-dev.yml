name: Migrate Dev DB

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    name: Push migrations to dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations
        run: |
          supabase db push \
            --db-url "postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD_DEV }}@db.${{ secrets.SUPABASE_PROJECT_ID_DEV }}.supabase.co:5432/postgres"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
